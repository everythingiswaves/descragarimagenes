<!DOCTYPE html>
<html>
<head>
    <style>
        .massive-btn {
            background-color: #ff4757;
            color: white;
            padding: 50px 100px;
            font-size: 36px;
            font-family: Arial, sans-serif;
            font-weight: 900;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
            text-transform: uppercase;
        }
        .massive-btn:hover { background-color: #ff6b81; }
    </style>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <button class="massive-btn" onclick="startMultiDownload()">
        Download All Images
    </button>

    <script>
        function startMultiDownload() {
            // REPLACE THESE with your actual file paths
            const images = [
                { url: 'photo.png', filename: 'photo1.png' }
            ];

            images.forEach((img, index) => {
                // We add a delay (index * 800ms) to prevent the browser from blocking simultaneous downloads
                setTimeout(() => {
                    const link = document.createElement('a');
                    link.href = img.url;
                    link.download = img.filename; // THIS forces the JPG/PNG extension
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }, index * 800); 
            });
        }
    </script>
</body>
</html>
